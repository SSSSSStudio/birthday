                    prefetchHtml.rel = 'prefetch';
                    prefetchHtml.href = 'lottery_shop.html';
                    document.head.appendChild(prefetchHtml);
                    const prefetchCss = document.createElement('link');
                    prefetchCss.rel = 'prefetch';
                    prefetchCss.href = 'lottery_shop.css';
                    document.head.appendChild(prefetchCss);
                    const prefetchJs = document.createElement('link');
                    prefetchJs.rel = 'prefetch';
                    prefetchJs.href = 'lottery_shop.js';
                    document.head.appendChild(prefetchJs);
                } catch (e) { /* 忽略 prefetch 失败 */ }

                let navigated = false;
                const navigate = () => {
                    if (navigated) return;
                    navigated = true;
                    window.location.href = 'lottery_shop.html';
                };

                playDoorTransition(
                    // 白光时刻：先不跳转，让动画继续播完
                    () => { /* no-op，等 onComplete 再跳 */ },
                    // 动画完整播完后再跳转，确保敲门 → 开门 → 白光过渡完整呈现
                    () => { navigate(); }
                );
            }

            // 店内场景已迁移到独立的 lottery_shop.html 关卡

            // 初始化街道场景物体列表（必须在 walker 创建完成后再注册）
            // 使用 mesh.metadata.isStreet 标记法避免误把角色子 mesh 加入
            // 这里采用快照方式：注册时刻，遍历所有 mesh，把"不属于 walker 子节点"的全部加入
            function isDescendantOf(node, root) {
                let cur = node.parent;
                while (cur) {
                    if (cur === root) return true;
                    cur = cur.parent;
                }
                return false;
            }
            function initStreetSceneObjects() {
                streetSceneObjects.length = 0; // 防止重复注册
                scene.meshes.forEach(mesh => {
                    // 排除角色及其所有子 mesh
                    if (walker && (mesh === walker || isDescendantOf(mesh, walker))) return;
                    streetSceneObjects.push(mesh);
                });
                scene.transformNodes.forEach(node => {
                    // 排除角色 TransformNode 本身和其子 TransformNode
                    if (walker && (node === walker || isDescendantOf(node, walker))) return;
                    streetSceneObjects.push(node);
                });
                scene.lights.forEach(l => {
                    streetSceneObjects.push(l);
                });
            }
            // 等 walker 创建完成 *并且* 所有街道物体都建好后再注册
            // 注意：tryInitStreet() 在 createScene 函数体执行流程中被声明，
            // 但实际触发要等到 createScene 整个函数 return 之后（街道物体已全部 new 完）
            // 所以用 setTimeout(0) 把它推到当前微任务之后执行。
            let _streetInitTries = 0;
            function tryInitStreet() {
                if (walker) {
                    initStreetSceneObjects();
                } else if (_streetInitTries++ < 30) {
                    setTimeout(tryInitStreet, 100);
                } else {
                    initStreetSceneObjects(); // 兜底
                }
            }
            // 推迟到 createScene 返回 + 一帧渲染之后，确保街道全部物体已构建
            setTimeout(tryInitStreet, 0);
            // 双保险：渲染开始后再注册一次（此时 walker、街道一定都齐全）
            scene.onReadyObservable.addOnce(() => {
                _streetInitTries = 0;
                tryInitStreet();
            });

            // ========== 彩票店控制（UI 引用已在前面统一获取，这里只声明业务变量）==========
            // 余额系统：优先从 sessionStorage 读取（从 lottery_shop.html 返回时保留余额）
            let balance = 100;
            try {
                const stored = sessionStorage.getItem('balance');
                if (stored !== null && !isNaN(parseInt(stored, 10))) {
                    balance = parseInt(stored, 10);
                }
            } catch (e) { /* 忽略 storage 错误 */ }

            // 更新余额显示，并同步到 sessionStorage
            function updateBalance() {
                balanceDisplay.textContent = balance;
                try { sessionStorage.setItem('balance', String(balance)); } catch (e) { /* ignore */ }
            }
            // 初始化显示
            updateBalance();

            // 打开彩票店（切换到杂货铺场景）
            lotteryShopButton.addEventListener('click', () => {
                switchToShopScene();
            });

            // 关闭彩票店（返回街道场景）
            closeShop.addEventListener('click', () => {
                switchToStreetScene();
            });

            // 刮刮乐奖项配置（真实刮刮乐玩法）
            const scratchCardPrizes = {
                5: {
                    gridCount: 15,  // 15个格子
                    winProbability: 0.25,  // 整体中奖概率25%
                    prizes: [
                        { symbol: '💎', amount: 1000, probability: 0.01 },
                        { symbol: '🌟', amount: 50, probability: 0.05 },
                        { symbol: '⭐', amount: 10, probability: 0.09 },
                        { symbol: '✨', amount: 5, probability: 0.10 }
                    ],
                    loseSymbol: '❌'
                },
                10: {
                    gridCount: 20,  // 20个格子
                    winProbability: 0.30,  // 整体中奖概率30%
                    prizes: [
                        { symbol: '💎', amount: 2000, probability: 0.008 },
                        { symbol: '🌟', amount: 100, probability: 0.04 },
                        { symbol: '⭐', amount: 20, probability: 0.12 },
                        { symbol: '✨', amount: 10, probability: 0.132 }
                    ],
                    loseSymbol: '❌'
                },
                20: {
                    gridCount: 25,  // 25个格子
                    winProbability: 0.35,  // 整体中奖概率35%
                    prizes: [
                        { symbol: '💎', amount: 5000, probability: 0.006 },
                        { symbol: '🌟', amount: 200, probability: 0.035 },
                        { symbol: '⭐', amount: 50, probability: 0.14 },
                        { symbol: '✨', amount: 20, probability: 0.169 }
                    ],
                    loseSymbol: '❌'
                }
            };

            // 生成刮刮乐格子
            function generateScratchGrid(price) {
                const config = scratchCardPrizes[price];
                const grid = [];
                
                // 首先决定这张彩票是否中奖
                const isTicketWin = Math.random() < config.winProbability;
                
                if (isTicketWin) {
                    // 中奖彩票：根据概率生成具体奖项
                    const random = Math.random();
                    let cumulativeProbability = 0;
                    let selectedPrize = null;
                    
                    for (const prize of config.prizes) {
                        cumulativeProbability += prize.probability;
                        if (random < cumulativeProbability) {
                            selectedPrize = prize;
                            break;
                        }
                    }
                    
                    // 添加中奖格子（1-3个）
                    const winCount = Math.floor(Math.random() * 3) + 1;  // 1-3个中奖格子
                    for (let i = 0; i < winCount; i++) {
                        grid.push({
                            symbol: selectedPrize.symbol,
                            amount: selectedPrize.amount,
                            isWin: true,
                            scratched: false
                        });
                    }
                }
                
                // 添加未中奖格子
                while (grid.length < config.gridCount) {
                    grid.push({
                        symbol: config.loseSymbol,
                        amount: 0,
                        isWin: false,
                        scratched: false
                    });
                }
                
                // 随机打乱格子顺序
                for (let i = grid.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [grid[i], grid[j]] = [grid[j], grid[i]];
                }
                
                return grid;
            }

            // 当前刮刮乐状态
            let currentScratchGrid = [];
            let currentScratchPrice = 0;
            let totalPrize = 0;

            // 创建刮刮乐格子
            function createScratchGrid(grid) {
                const gridContainer = document.getElementById('scratchGrid');
                gridContainer.innerHTML = '';
                totalPrize = 0;
                document.getElementById('scratchTotal').textContent = '总奖金: 0元';
                
                grid.forEach((cell, index) => {
                    const cellElement = document.createElement('div');
                    cellElement.className = 'scratch-cell';
                    cellElement.dataset.index = index;
                    cellElement.textContent = '?';
                    
                    // 点击刮开格子
                    cellElement.addEventListener('click', () => {
                        if (cellElement.classList.contains('scratched')) return;
                        
                        cellElement.classList.add('scratched');
                        cellElement.textContent = cell.symbol;
                        
                        if (cell.isWin) {
                            cellElement.classList.add('win');
                            totalPrize += cell.amount;
                            document.getElementById('scratchTotal').textContent = `总奖金: ${totalPrize}元`;
                        }
                        
                        grid[index].scratched = true;
                    });
                    
                    // 触摸事件（手机）
                    cellElement.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (cellElement.classList.contains('scratched')) return;
                        
                        cellElement.classList.add('scratched');
                        cellElement.textContent = cell.symbol;
                        
                        if (cell.isWin) {
                            cellElement.classList.add('win');
                            totalPrize += cell.amount;
                            document.getElementById('scratchTotal').textContent = `总奖金: ${totalPrize}元`;
                        }
                        
                        grid[index].scratched = true;
                    });
                    
                    gridContainer.appendChild(cellElement);
                });
            }

            // 关闭刮刮乐界面
            closeScratch.addEventListener('click', () => {
                // 如果有中奖，添加到余额
                if (totalPrize > 0) {
                    balance += totalPrize;
                    updateBalance();
                }
                scratchCard.style.display = 'none';
            });

            // 点击刮刮乐选项
            scratchCardOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const price = parseInt(option.dataset.price);
                    
                    // 检查余额
                    if (balance < price) {
                        insufficientFunds.style.display = 'block';
                        setTimeout(() => {
                            insufficientFunds.style.display = 'none';
                        }, 2000);
                        return;
                    }
                    
                    // 扣除金额
                    balance -= price;
                    updateBalance();
                    
                    // 生成刮刮乐格子
                    currentScratchGrid = generateScratchGrid(price);
                    currentScratchPrice = price;
                    
                    // 显示刮刮乐界面
                    scratchCard.style.display = 'flex';
                    createScratchGrid(currentScratchGrid);
                });
            });

            // ========== 抽奖按钮控制（UI 引用已在前面统一获取，这里只声明业务变量）==========
            // 图标列表
            const icons = ['🍎', '🍊', '🍋', '🍇', '🍒', '💎', '⭐', '🌟'];

            // 点击抽奖按钮
            //   - 街道场景：打开老虎机
            //   - 店内场景（柜台前）：根据 dataset.shopPrice 直接打开对应刮刮乐
            lotteryButton.addEventListener('click', () => {
                const shopPrice = lotteryButton.dataset.shopPrice;
                if (currentScene === 'shop' && shopPrice) {
                    const price = parseInt(shopPrice);
                    // 检查余额
                    if (balance < price) {
                        insufficientFunds.style.display = 'block';
                        setTimeout(() => { insufficientFunds.style.display = 'none'; }, 2000);
                        return;
                    }
                    balance -= price;
                    updateBalance();
                    currentScratchGrid = generateScratchGrid(price);
                    currentScratchPrice = price;
                    scratchCard.style.display = 'flex';
                    createScratchGrid(currentScratchGrid);
                    return;
                }
                // 街道：老虎机
                slotMachine.style.display = 'flex';
                moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';
            });

            // 关闭老虎机
            closeSlotMachine.addEventListener('click', () => {
                slotMachine.style.display = 'none';
            });

            // 开始抽奖
            spinButton.addEventListener('click', () => {
                spinButton.disabled = true;
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';

                // 随机决定是否中奖（10%概率）
                const isWin = Math.random() < 0.1;

                // 播放滚动动画
                reels.forEach(reel => reel.classList.add('spinning'));

                // 依次停止滚轮
                const stopTimes = [1000, 2000, 3000];
                reels.forEach((reel, index) => {
                    setTimeout(() => {
                        reel.classList.remove('spinning');
                        if (isWin) {
                            // 中奖：所有滚轮显示相同图标
                            reel.textContent = icons[Math.floor(Math.random() * icons.length)];
                        } else {
                            // 未中奖：随机图标
                            reel.textContent = icons[Math.floor(Math.random() * icons.length)];
                        }
                    }, stopTimes[index]);
                });

                // 显示结果
                setTimeout(() => {
                    spinButton.disabled = false;
                    
                    if (isWin) {
                        // 确保三个图标相同
                        const winningIcon = reels[0].textContent;
                        reels[1].textContent = winningIcon;
                        reels[2].textContent = winningIcon;
                        
                        resultMessage.textContent = '🎉 恭喜中奖！🎉';
                        resultMessage.className = 'result-message win';
                        
                        // 播放烟花特效
                        createFireworks();
                    } else {
                        resultMessage.textContent = '再接再厉！';
                        resultMessage.className = 'result-message lose';
                    }
                }, 3500);
            });

            scene.registerBeforeRender(() => {
                // ========== 街道动态系统：车辆移动 + 红绿灯切换 + 动态 AABB 刷新 ==========
                // 这些更新与角色是否存在/场景是否切换无关，每帧都跑（让街道始终活着）
                updateVehicles();
                updateTrafficLights(performance.now());
                refreshDynamicObstacles();

                if (!walker) return;

                // ========== 合并键盘输入到 moveInput（街道和店内都支持）==========
                if (currentScene === 'street' || currentScene === 'shop') {
                    let kx = 0, kz = 0;
                    if (keyState.up) kz -= 1;
                    if (keyState.down) kz += 1;
                    if (keyState.left) kx -= 1;
                    if (keyState.right) kx += 1;

                    if (kx !== 0 || kz !== 0) {
                        const len = Math.sqrt(kx * kx + kz * kz);
                        const sx = kx / len, sy = -kz / len;
                        const world = screenToWorldDir(sx, sy);
                        const wlen = Math.sqrt(world.x * world.x + world.z * world.z) || 1;
                        moveInput.x = world.x / wlen;
                        moveInput.z = world.z / wlen;
                        moveInput.magnitude = 1;
                    } else if (!joystickActive) {
                        moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                    }
                }

                // ========== 角色移动（XZ 平面）==========
                const canMove = moveInput.magnitude > 0.05 && (currentScene === 'street' || currentScene === 'shop');
                if (canMove) {
                    const dx = moveInput.x * WALK_SPEED;
                    const dz = moveInput.z * WALK_SPEED;
                    const newX = walker.position.x + dx;
                    const newZ = walker.position.z + dz;

                    // 根据场景选择边界
                    const boundX = currentScene === 'shop' ? SHOP_BOUND_X : WALK_BOUND_X;
                    const boundZ = currentScene === 'shop' ? SHOP_BOUND_Z : WALK_BOUND_Z;

                    // 街道场景：分轴检测障碍物 AABB（允许沿墙滑动，不会被卡住）
                    // 店内场景：保持原边界检查（店内已有专门的墙体）
                    if (currentScene === 'street') {
                        const curX = walker.position.x;
                        const curZ = walker.position.z;
                        // 先尝试 X 轴：用 (newX, curZ) 检测
                        if (Math.abs(newX) <= boundX && !isPointBlocked(newX, curZ)) {
                            walker.position.x = newX;
                        }
                        // 再尝试 Z 轴：用 (新的 walker.x, newZ) 检测，已更新的 X 也算
                        if (Math.abs(newZ) <= boundZ && !isPointBlocked(walker.position.x, newZ)) {
                            walker.position.z = newZ;
                        }
                    } else {
                        if (Math.abs(newX) <= boundX) walker.position.x = newX;
                        if (Math.abs(newZ) <= boundZ) walker.position.z = newZ;
                    }

                    walkTime += 0.2 * moveInput.magnitude;
                    walker.rotation.y = Math.atan2(moveInput.x, moveInput.z);

                    if (walkerLegs) {
                        walkerLegs.legL.rotation.x = Math.sin(walkTime) * 0.6;
                        walkerLegs.legR.rotation.x = -Math.sin(walkTime) * 0.6;
                        // 手臂摆动（反向）
                        if (walkerLegs.armL) walkerLegs.armL.rotation.x = -Math.sin(walkTime) * 0.4;
                        if (walkerLegs.armR) walkerLegs.armR.rotation.x = Math.sin(walkTime) * 0.4;
                        walker.position.y = Math.abs(Math.sin(walkTime * 2)) * 0.05;
                    }
                } else {
                    if (walkerLegs) {
                        walkerLegs.legL.rotation.x = 0;
                        walkerLegs.legR.rotation.x = 0;
                        if (walkerLegs.armL) walkerLegs.armL.rotation.x = 0;
                        if (walkerLegs.armR) walkerLegs.armR.rotation.x = 0;
                        walker.position.y = 0;
                    }
                }

                // ========== 相机跟随 ==========
                camera.target.x = walker.position.x;
                camera.target.z = walker.position.z;
                camera.target.y = 0.5;

                // ========== 触发点检测 ==========
                if (currentScene === 'street') {
                    // 彩票店
                    const dxShop = walker.position.x - LOTTERY_SHOP_X;
                    const dzShop = walker.position.z - LOTTERY_SHOP_Z;
                    const distShop = Math.sqrt(dxShop * dxShop + dzShop * dzShop);
                    if (distShop < TRIGGER_DISTANCE) {
                        atLotteryShop = true;
                        lotteryShopButton.style.display = 'block';
                    } else {
                        atLotteryShop = false;
                        lotteryShopButton.style.display = 'none';
                    }

                    // 抽奖触发点
                    const dxLot = walker.position.x - LOTTERY_X;
                    const dzLot = walker.position.z - LOTTERY_Z;
                    const distLot = Math.sqrt(dxLot * dxLot + dzLot * dzLot);
                    if (distLot < TRIGGER_DISTANCE) {
                        lotteryButton.style.display = 'block';
                    } else {
                        lotteryButton.style.display = 'none';
                    }
                } else if (currentScene === 'shop') {
                    // 店内：检测是否走到门口（出门）
                    const dxExit = walker.position.x - SHOP_EXIT_X;
                    const dzExit = walker.position.z - SHOP_EXIT_Z;
                    const distExit = Math.sqrt(dxExit * dxExit + dzExit * dzExit);
                    if (distExit < 1.2) {
                        // 自动出门
                        switchToStreetScene();
                        return;
                    }

                    // 检测是否靠近柜台（显示"购买 Xx 元刮刮乐"按钮）
                    let nearestPrice = null;
                    let nearestDist = 2.0;
                    [ -4, 0, 4 ].forEach((cx, idx) => {
                        const prices = [5, 10, 20];
                        const dxC = walker.position.x - cx;
                        const dzC = walker.position.z - (-18 / 2 + 1.5 + 1); // 柜台前方
                        const distC = Math.sqrt(dxC * dxC + dzC * dzC);
                        if (distC < nearestDist) {
                            nearestDist = distC;
                            nearestPrice = prices[idx];
                        }
                    });
                    if (nearestPrice) {
                        lotteryButton.style.display = 'block';
                        lotteryButton.textContent = `🎫 购买 ${nearestPrice} 元刮刮乐`;
                        lotteryButton.dataset.shopPrice = nearestPrice;
                    } else {
                        if (lotteryButton.dataset.shopPrice) {
                            // 离开柜台，恢复原来文案
                            lotteryButton.textContent = '🎰 抽奖';
                            delete lotteryButton.dataset.shopPrice;
                        }
                        lotteryButton.style.display = 'none';
                    }
                }
            });

            // ========== 烟花粒子特效 ==========
            function createFireworks() {
                const fireworkColors = [
                    new BABYLON.Color4(1, 0, 0, 1),
                    new BABYLON.Color4(0, 1, 0, 1),
                    new BABYLON.Color4(0, 0, 1, 1),
                    new BABYLON.Color4(1, 1, 0, 1),
                    new BABYLON.Color4(1, 0, 1, 1),
                    new BABYLON.Color4(0, 1, 1, 1),
                    new BABYLON.Color4(1, 0.5, 0, 1)
                ];

                // 创建多个烟花爆炸
                for (let f = 0; f < 5; f++) {
                    setTimeout(() => {
                        const centerX = walker.position.x + (Math.random() - 0.5) * 6;
                        const centerY = 5 + Math.random() * 3;
                        const centerZ = (Math.random() - 0.5) * 4;

                        const particleSystem = new BABYLON.ParticleSystem("firework" + f, 500, scene);
                        
                        // 创建圆形纹理
                        const size = 32;
                        const textureCanvas = document.createElement('canvas');
                        textureCanvas.width = size;
                        textureCanvas.height = size;
                        const ctx = textureCanvas.getContext('2d');
                        
                        const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                        gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
                        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                        
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        particleSystem.particleTexture = new BABYLON.Texture(textureCanvas.toDataURL(), scene);
                        
                        particleSystem.emitter = new BABYLON.Vector3(centerX, centerY, centerZ);
                        particleSystem.minEmitBox = new BABYLON.Vector3(0, 0, 0);
                        particleSystem.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
                        
                        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                        particleSystem.color1 = color;
                        particleSystem.color2 = new BABYLON.Color4(color.r * 0.8, color.g * 0.8, color.b * 0.8, 1);
                        particleSystem.colorDead = new BABYLON.Color4(0, 0, 0, 0);
                        
                        particleSystem.minSize = 0.1;
                        particleSystem.maxSize = 0.3;
                        
                        particleSystem.minLifeTime = 1;
                        particleSystem.maxLifeTime = 2;
                        
                        particleSystem.emitRate = 500;
                        particleSystem.manualEmitCount = 500;
                        
                        particleSystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
                        
                        particleSystem.gravity = new BABYLON.Vector3(0, -5, 0);
                        
                        particleSystem.direction1 = new BABYLON.Vector3(-1, 0, -1);
                        particleSystem.direction2 = new BABYLON.Vector3(1, 1, 1);
                        
                        particleSystem.minAngularSpeed = 0;
                        particleSystem.maxAngularSpeed = Math.PI;
                        
                        particleSystem.minEmitPower = 8;
                        particleSystem.maxEmitPower = 12;
                        particleSystem.updateSpeed = 0.01;
                        
                        particleSystem.start();
                        
                        // 2秒后停止并销毁
                        setTimeout(() => {
                            particleSystem.stop();
                            setTimeout(() => {
                                particleSystem.dispose();
                            }, 2000);
                        }, 100);
                    }, f * 300);
                }
            }

            return scene;
        };
        
        const scene = createScene();
        
        engine.runRenderLoop(function() {
            scene.render();
        });
        
        window.addEventListener("resize", function() {
            engine.resize();
        });
    </script>
</body>
