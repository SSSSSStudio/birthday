            // ========== 红绿灯（每个路口外侧 4 角，每个由杆 + 灯箱 + 红黄绿 3 灯 + 倒计时面板） ==========
            // 状态机：红 30s → 黄 5s → 绿 30s → 黄 5s → 红 ... 循环
            const trafficLights = []; // { red, yellow, green, countdownTexture, countdownMat }
            function createTrafficLight(x, z, facingDeg) {
                const group = new BABYLON.TransformNode("trafficLight_" + x + "_" + z, scene);

                // 杆（深灰圆柱）
                const pole = BABYLON.MeshBuilder.CreateCylinder(
                    "tl_pole", { diameter: 0.22, height: 3.4, tessellation: 10 }, scene
                );
                pole.position.set(x, 1.7, z);
                pole.material = legoMat("tlPoleMat", LEGO_COLORS.darkGray);
                pole.parent = group;

                // 灯箱（黑色长方体）
                const box = BABYLON.MeshBuilder.CreateBox(
                    "tl_box", { width: 0.5, height: 1.5, depth: 0.45 }, scene
                );
                box.position.set(x, 3.6, z);
                box.material = legoMat("tlBoxMat", LEGO_COLORS.black);
                box.parent = group;

                // 3 个灯（红、黄、绿）
                function makeLamp(name, color, yOffset) {
                    const ball = BABYLON.MeshBuilder.CreateSphere(name,
                        { diameter: 0.32, segments: 12 }, scene);
                    ball.position.set(x, 3.6 + yOffset, z + 0.25);
                    const mat = legoMat(name + "Mat", color);
                    mat.emissiveColor = color.scale(0.1);
                    ball.material = mat;
                    ball.parent = group;
                    return { ball, mat, baseColor: color };
                }
                const red    = makeLamp("tl_red_" + x + z,    LEGO_COLORS.red,    0.45);
                const yellow = makeLamp("tl_yellow_" + x + z, LEGO_COLORS.yellow, 0.0);
                const green  = makeLamp("tl_green_" + x + z,  LEGO_COLORS.green, -0.45);

                // 倒计时面板：黑色平面 + DynamicTexture 显示数字
                const countdownPlane = BABYLON.MeshBuilder.CreatePlane(
                    "tl_countdown_" + x + "_" + z,
                    { width: 0.6, height: 0.6 }, scene
                );
                countdownPlane.position.set(x, 2.6, z + 0.27);
                const countdownTexture = new BABYLON.DynamicTexture(
                    "tl_countdownTex_" + x + "_" + z,
                    { width: 128, height: 128 }, scene, false
                );
                countdownTexture.hasAlpha = false;
                const countdownMat = new BABYLON.StandardMaterial("tl_countdownMat_" + x + "_" + z, scene);
                countdownMat.diffuseTexture = countdownTexture;
                countdownMat.emissiveTexture = countdownTexture; // 自发光：让数字晚上也清晰
                countdownMat.specularColor = new BABYLON.Color3(0, 0, 0);
                countdownPlane.material = countdownMat;
                countdownPlane.parent = group;

                // 旋转灯箱朝向（绕路口中心轴）
                const rad = facingDeg * Math.PI / 180;
                [red.ball, yellow.ball, green.ball, box, countdownPlane].forEach(m => {
                    if (m === box || m === countdownPlane) {
                        m.rotation.y = rad;
                    }
                    const dz = m.position.z - z;
                    const dx = m.position.x - x;
                    m.position.x = x + dx * Math.cos(rad) - dz * Math.sin(rad);
                    m.position.z = z + dx * Math.sin(rad) + dz * Math.cos(rad);
                });

                registerStaticObstacle(x, z, 0.15, 0.15, 0.2);
                trafficLights.push({ red, yellow, green, countdownTexture, lastSecond: -1, lastColor: '' });
            }
            // 在每个十字路口的 4 个外角放红绿灯
            const tlOffset = ROAD_WIDTH / 2 + SIDEWALK_WIDTH + 0.4;
            for (const xCoord of ROADS_Z) {
                for (const zCoord of ROADS_X) {
                    createTrafficLight(xCoord + tlOffset, zCoord + tlOffset, 225); // 东北角，灯朝西南
                    createTrafficLight(xCoord - tlOffset, zCoord + tlOffset, 135); // 西北角，灯朝东南
                    createTrafficLight(xCoord - tlOffset, zCoord - tlOffset,  45); // 西南角，灯朝东北
                    createTrafficLight(xCoord + tlOffset, zCoord - tlOffset, 315); // 东南角，灯朝西北
                }
            }

            // 红绿灯状态机（全局共享，循环：红 30s → 黄 5s → 绿 30s → 黄 5s → 红...）
            let trafficPhase = 'red';
            let trafficPhaseStart = performance.now();
            const TRAFFIC_DURATIONS = { red: 30000, yellow: 5000, green: 30000 };
            const PHASE_NEXT = { red: 'yellow', yellow_red: 'green', green: 'yellow_green', yellow_green: 'red', yellow: 'green' };
            // 简化为 4 阶段轮换：red → yellow → green → yellow → red
            // 用 nextAfterYellow 记录黄灯之后该走红还是绿
            let nextAfterYellow = 'green';

            function setLampOn(lamp, on) {
                lamp.mat.emissiveColor = on ? lamp.baseColor.scale(0.9) : lamp.baseColor.scale(0.08);
            }
            function applyTrafficPhase() {
                const showRed = trafficPhase === 'red';
                const showYellow = trafficPhase === 'yellow';
                const showGreen = trafficPhase === 'green';
                trafficLights.forEach(tl => {
                    setLampOn(tl.red, showRed);
                    setLampOn(tl.yellow, showYellow);
                    setLampOn(tl.green, showGreen);
                    tl.lastSecond = -1; // 强制下一帧刷新倒计时
                });
            }
            applyTrafficPhase();

            // 倒计时数字色
            const PHASE_TEXT_COLOR = { red: '#ff3030', yellow: '#ffd700', green: '#30dd30' };
            function drawCountdown(tl, secondsLeft, phase) {
                if (tl.lastSecond === secondsLeft && tl.lastColor === phase) return;
                tl.lastSecond = secondsLeft;
                tl.lastColor = phase;
                const ctx = tl.countdownTexture.getContext();
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 128, 128);
                ctx.fillStyle = PHASE_TEXT_COLOR[phase];
                ctx.font = 'bold 86px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String(secondsLeft), 64, 70);
                tl.countdownTexture.update(false);
            }

            function updateTrafficLights(now) {
                const elapsed = now - trafficPhaseStart;
                const total = TRAFFIC_DURATIONS[trafficPhase];
                if (elapsed >= total) {
                    if (trafficPhase === 'red') {
                        trafficPhase = 'yellow'; nextAfterYellow = 'green';
                    } else if (trafficPhase === 'green') {
                        trafficPhase = 'yellow'; nextAfterYellow = 'red';
                    } else { // yellow
                        trafficPhase = nextAfterYellow;
                    }
                    trafficPhaseStart = now;
                    applyTrafficPhase();
                }
                // 刷新倒计时数字
                const remain = TRAFFIC_DURATIONS[trafficPhase] - (now - trafficPhaseStart);
                const secondsLeft = Math.max(0, Math.ceil(remain / 1000));
                trafficLights.forEach(tl => drawCountdown(tl, secondsLeft, trafficPhase));
            }

            // ========== 车辆（乐高小车，沿马路循环行驶，每条路 2 辆双向） ==========
            // 一辆车的参数：
            //   axis: 'x' | 'z'  车辆行驶轴向
            //   roadCoord: 道路所在的"垂直于行驶方向"的坐标
            //                axis='x' 时 roadCoord = z 坐标（横向主路 z）
            //                axis='z' 时 roadCoord = x 坐标（纵向次路 x）
            //   lane: -1 | +1  车道偏移（沿前进方向右手 +1）
            //   dir: -1 | +1   实际行驶方向（按右行交通：lane=-1 走 +dir，lane=+1 走 -dir）
            //   speed, startOffset, bodyColor
            // 循环范围：
            //   axis='x'：x ∈ [-GROUND_W/2-2, GROUND_W/2+2]
            //   axis='z'：z ∈ [-GROUND_D/2-2, GROUND_D/2+2]
            const vehicles = [];
            function createVehicle(axis, roadCoord, lane, speed, startOffset, bodyColor) {
                const L = 1.8, W = 0.9, H = 0.6;
                const group = new BABYLON.TransformNode("vehicle", scene);

                // 车身（本地坐标：长边沿 Z，短边沿 X，车头朝 +Z）
                const body = BABYLON.MeshBuilder.CreateBox(
                    "vBody", { width: W, height: H, depth: L }, scene
                );
                body.position.y = H / 2 + 0.15;
                body.material = legoMat("vBodyMat_" + bodyColor.toHexString(), bodyColor);
                body.parent = group;

                // 车顶（驾驶舱）
                const cab = BABYLON.MeshBuilder.CreateBox(
                    "vCab", { width: W * 0.85, height: 0.4, depth: L * 0.55 }, scene
                );
                cab.position.set(0, H + 0.35, -L * 0.05);
                cab.material = legoMat("vCabMat", LEGO_COLORS.white);
                cab.parent = group;

                // 车头大灯
                [-W * 0.3, W * 0.3].forEach((dx, i) => {
                    const headlight = BABYLON.MeshBuilder.CreateBox(
                        "vHead" + i, { width: 0.18, height: 0.15, depth: 0.05 }, scene
                    );
                    headlight.position.set(dx, H * 0.5 + 0.15, L / 2 + 0.025);
                    const hlMat = legoMat("vHeadMat", LEGO_COLORS.yellow);
                    hlMat.emissiveColor = new BABYLON.Color3(0.6, 0.55, 0.1);
                    headlight.material = hlMat;
                    headlight.parent = group;
                });

                // 4 个轮子
                const wheelOffsets = [
                    [-W * 0.45, -L * 0.35], [W * 0.45, -L * 0.35],
                    [-W * 0.45,  L * 0.35], [W * 0.45,  L * 0.35]
                ];
                wheelOffsets.forEach(([dx, dz], i) => {
                    const wheel = BABYLON.MeshBuilder.CreateCylinder(
                        "vWheel" + i, { diameter: 0.32, height: 0.18, tessellation: 12 }, scene
                    );
                    wheel.rotation.z = Math.PI / 2;
                    wheel.position.set(dx, 0.16, dz);
                    wheel.material = legoMat("vWheelMat", LEGO_COLORS.black);
                    wheel.parent = group;
                });

                // 计算初始位置：lane 偏移加在 roadCoord 上
                const dir = lane < 0 ? 1 : -1;
                let posX, posZ;
                if (axis === 'x') {
                    posZ = roadCoord + lane * LANE_HALF;
                    posX = startOffset;
                } else {
                    posX = roadCoord + lane * LANE_HALF;
                    posZ = startOffset;
                }
                group.position = new BABYLON.Vector3(posX, 0, posZ);

                // AABB
                const halfX = (axis === 'x' ? L : W) / 2;
                const halfZ = (axis === 'x' ? W : L) / 2;
                const obstacle = registerDynamicObstacle(group, halfX, halfZ, 0.1);
                vehicles.push({ group, axis, roadCoord, dir, speed, obstacle });
            }

            // 横向主路 2 辆/条（双向）
            const xVehicleColors = [LEGO_COLORS.red, LEGO_COLORS.blue, LEGO_COLORS.green, LEGO_COLORS.orange];
            ROADS_X.forEach((zCoord, idx) => {
                // 左车道（z = zCoord - LANE_HALF）向 +X 跑
                createVehicle('x', zCoord, -1, 0.08, -GROUND_W / 2 + idx * 8 + 2,
                    xVehicleColors[(idx * 2) % xVehicleColors.length]);
                // 右车道（z = zCoord + LANE_HALF）向 -X 跑
                createVehicle('x', zCoord,  1, 0.07,  GROUND_W / 2 - idx * 8 - 5,
                    xVehicleColors[(idx * 2 + 1) % xVehicleColors.length]);
            });

            // 纵向次路 2 辆/条（双向）
            const zVehicleColors = [LEGO_COLORS.yellow, LEGO_COLORS.purple, LEGO_COLORS.tan, LEGO_COLORS.lime];
            ROADS_Z.forEach((xCoord, idx) => {
                // 左车道向 +Z 跑
                createVehicle('z', xCoord, -1, 0.075, -GROUND_D / 2 + idx * 5 + 2,
                    zVehicleColors[(idx * 2) % zVehicleColors.length]);
                // 右车道向 -Z 跑
                createVehicle('z', xCoord,  1, 0.085,  GROUND_D / 2 - idx * 5 - 4,
                    zVehicleColors[(idx * 2 + 1) % zVehicleColors.length]);
            });

            const VEHICLE_LIMIT_X = GROUND_W / 2 + 2;
            const VEHICLE_LIMIT_Z = GROUND_D / 2 + 2;
            function updateVehicles() {
                vehicles.forEach(v => {
                    if (v.axis === 'x') {
                        v.group.position.x += v.dir * v.speed;
                        v.group.rotation.y = v.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
                        if (v.dir > 0 && v.group.position.x > VEHICLE_LIMIT_X) {
                            v.group.position.x = -VEHICLE_LIMIT_X;
                        } else if (v.dir < 0 && v.group.position.x < -VEHICLE_LIMIT_X) {
                            v.group.position.x = VEHICLE_LIMIT_X;
                        }
                    } else {
                        v.group.position.z += v.dir * v.speed;
                        v.group.rotation.y = v.dir > 0 ? 0 : Math.PI;
                        if (v.dir > 0 && v.group.position.z > VEHICLE_LIMIT_Z) {
                            v.group.position.z = -VEHICLE_LIMIT_Z;
                        } else if (v.dir < 0 && v.group.position.z < -VEHICLE_LIMIT_Z) {
                            v.group.position.z = VEHICLE_LIMIT_Z;
                        }
                    }
                });
            }

            // ========== 彩票店建筑（乐高风格） ==========
            const lotteryShopGroup = createLegoBuilding(LOTTERY_SHOP_X, LOTTERY_SHOP_Z - 2, 2, LEGO_COLORS.purple, LEGO_COLORS.yellow);
            // 彩票店招牌（紫色方块 + 金色描边）
            const shopSign = BABYLON.MeshBuilder.CreateBox(
                "shopSign",
                { width: 3, height: 0.6, depth: 0.15 },
                scene
            );
            shopSign.position.set(LOTTERY_SHOP_X, 2.3, LOTTERY_SHOP_Z - 2 + 3.5 / 2 + 0.1);
            const signMat = legoMat("signMat", LEGO_COLORS.purple);
            signMat.emissiveColor = new BABYLON.Color3(0.25, 0.1, 0.35);
            shopSign.material = signMat;

            // 彩票店触发点（浮动紫色 2x2 乐高积木）
            const lotteryShopTrigger = BABYLON.MeshBuilder.CreateBox(
                "lotteryShopTrigger",
                { width: 0.9, height: 0.5, depth: 0.9 },
                scene
            );
            lotteryShopTrigger.position.set(LOTTERY_SHOP_X, 0.5, LOTTERY_SHOP_Z);
            const shopTriggerMat = legoMat("shopTriggerMat", LEGO_COLORS.purple);
            shopTriggerMat.emissiveColor = new BABYLON.Color3(0.25, 0.1, 0.35);
            lotteryShopTrigger.material = shopTriggerMat;
            // 触发点顶部突点
            for (let sx = -0.22; sx <= 0.22; sx += 0.44) {
                for (let sz = -0.22; sz <= 0.22; sz += 0.44) {
                    const stud = createStud(LOTTERY_SHOP_X + sx, LOTTERY_SHOP_Z + sz, LEGO_COLORS.purple, 0.75);
                    stud.parent = lotteryShopTrigger;
                }
            }

            // 彩票店触发点光源
            const shopLight = new BABYLON.PointLight(
                "shopLight",
                new BABYLON.Vector3(LOTTERY_SHOP_X, 1.2, LOTTERY_SHOP_Z),
                scene
            );
            shopLight.diffuse = new BABYLON.Color3(0.8, 0.4, 1);
            shopLight.intensity = 1.0;
            shopLight.range = 4;

            let shopTime = 0;
            scene.registerBeforeRender(() => {
                shopTime += 0.02;
                lotteryShopTrigger.rotation.y += 0.02;
                lotteryShopTrigger.position.y = 0.6 + Math.sin(shopTime * 2.5) * 0.12;
                shopLight.intensity = 0.8 + Math.sin(shopTime * 4) * 0.3;
            });

            // ========== 终点标记（红色乐高积木） ==========
            const marker = BABYLON.MeshBuilder.CreateBox(
                "marker",
                { width: 0.9, height: 0.5, depth: 0.9 },
                scene
            );
            marker.position.set(MARKER_X, 0.5, MARKER_Z);
            const markerMat = legoMat("markerMat", LEGO_COLORS.red);
            markerMat.emissiveColor = new BABYLON.Color3(0.4, 0.05, 0.1);
            marker.material = markerMat;
            for (let sx = -0.22; sx <= 0.22; sx += 0.44) {
                for (let sz = -0.22; sz <= 0.22; sz += 0.44) {
                    const stud = createStud(MARKER_X + sx, MARKER_Z + sz, LEGO_COLORS.red, 0.75);
                    stud.parent = marker;
                }
            }

            const markerLight = new BABYLON.PointLight(
                "markerLight",
                new BABYLON.Vector3(MARKER_X, 1.5, MARKER_Z),
                scene
            );
            markerLight.diffuse = new BABYLON.Color3(1, 0.4, 0.5);
            markerLight.intensity = 1.0;
            markerLight.range = 5;

            let markerTime = 0;
            scene.registerBeforeRender(() => {
                markerTime += 0.02;
                marker.rotation.y += 0.015;
                marker.position.y = 0.6 + Math.sin(markerTime * 2) * 0.15;
                markerLight.intensity = 0.9 + Math.sin(markerTime * 3) * 0.3;
            });

            // ========== 抽奖触发点（老虎机造型） ==========
            // 老虎机外观：底座柜体 + 屏幕窗口 + 3 个滚轮 + 顶部装饰灯 + 右侧拉杆
            // 整体作为 TransformNode 组，便于做浮动动画和注册碰撞
            const lotteryTrigger = new BABYLON.TransformNode("lotteryTrigger", scene);
            lotteryTrigger.position.set(LOTTERY_X, 0, LOTTERY_Z);

            // 兼容现有 lotteryTrigger.rotation/position 动画的代理：用一个隐藏的 root mesh 承载
            // （TransformNode 已自带 rotation/position 属性，无需代理）

            // 底座柜体（红色长方体，宽 1.4 × 高 1.6 × 深 0.9）
            const slotBase = BABYLON.MeshBuilder.CreateBox("slotBase",
                { width: 1.4, height: 1.6, depth: 0.9 }, scene);
            slotBase.position.set(0, 0.8, 0);
            const slotBaseMat = legoMat("slotBaseMat", LEGO_COLORS.red);
            slotBaseMat.emissiveColor = new BABYLON.Color3(0.25, 0.05, 0.05);
            slotBase.material = slotBaseMat;
            slotBase.parent = lotteryTrigger;

            // 顶部装饰罩（金色梯形，用稍小一圈的方块代替）
            const slotTop = BABYLON.MeshBuilder.CreateBox("slotTop",
                { width: 1.55, height: 0.35, depth: 1.0 }, scene);
            slotTop.position.set(0, 1.78, 0);
            const slotTopMat = legoMat("slotTopMat", LEGO_COLORS.yellow);
            slotTopMat.emissiveColor = new BABYLON.Color3(0.5, 0.4, 0);
            slotTop.material = slotTopMat;
            slotTop.parent = lotteryTrigger;

            // 顶部装饰灯（3 个小球，红黄红交替闪烁）
            const slotTopLamps = [];
            [-0.45, 0, 0.45].forEach((dx, i) => {
                const lampBall = BABYLON.MeshBuilder.CreateSphere("slotTopLamp" + i,
                    { diameter: 0.18, segments: 10 }, scene);
                lampBall.position.set(dx, 2.05, 0);
                const color = i === 1 ? LEGO_COLORS.yellow : LEGO_COLORS.red;
                const lampMat = legoMat("slotLampMat" + i, color);
                lampMat.emissiveColor = color.scale(0.7);
                lampBall.material = lampMat;
                lampBall.parent = lotteryTrigger;
                slotTopLamps.push({ mat: lampMat, baseColor: color });
            });

            // 屏幕窗口（黑色背板，前面贴 3 个滚轮）
            const slotScreen = BABYLON.MeshBuilder.CreateBox("slotScreen",
                { width: 1.05, height: 0.55, depth: 0.06 }, scene);
            slotScreen.position.set(0, 1.15, 0.46);
            slotScreen.material = legoMat("slotScreenMat", LEGO_COLORS.black);
            slotScreen.parent = lotteryTrigger;

            // 3 个滚轮（白色圆柱，水平方向，会绕自身轴旋转）
            const slotReels = [];
            const reelSymbolColors = [LEGO_COLORS.red, LEGO_COLORS.green, LEGO_COLORS.blue,
                                     LEGO_COLORS.orange, LEGO_COLORS.purple, LEGO_COLORS.yellow];
            [-0.32, 0, 0.32].forEach((dx, i) => {
                const reel = BABYLON.MeshBuilder.CreateCylinder("slotReel" + i,
                    { diameter: 0.42, height: 0.28, tessellation: 18 }, scene);
                reel.rotation.z = Math.PI / 2; // 卧倒：轴沿 X，圆面朝前
                reel.position.set(dx, 1.15, 0.5);
                const reelMat = legoMat("slotReelMat" + i, LEGO_COLORS.white);
                reel.material = reelMat;
                reel.parent = lotteryTrigger;

                // 在滚轮的"侧面圆周"上贴几个彩色符号方块（旋转时给玩家看到滚动效果）
                const symbolCount = 6;
                for (let s = 0; s < symbolCount; s++) {
                    const angle = (s / symbolCount) * Math.PI * 2;
                    const sym = BABYLON.MeshBuilder.CreateBox("slotSym" + i + "_" + s,
                        { width: 0.15, height: 0.06, depth: 0.18 }, scene);
                    // 符号在圆柱表面外侧
                    const r = 0.21 + 0.03;
                    sym.position.set(0, Math.cos(angle) * r, Math.sin(angle) * r);
                    sym.rotation.x = angle;
                    sym.material = legoMat("slotSymMat" + i + s, reelSymbolColors[(i * 2 + s) % reelSymbolColors.length]);
                    sym.parent = reel;
                }
                slotReels.push(reel);
            });

            // 右侧拉杆（一根斜向圆柱 + 顶端红球）
            const leverArm = BABYLON.MeshBuilder.CreateCylinder("slotLeverArm",
                { diameter: 0.08, height: 0.7, tessellation: 8 }, scene);
            leverArm.position.set(0.85, 1.4, 0);
            leverArm.rotation.z = -0.3; // 略向外倾
            leverArm.material = legoMat("slotLeverMat", LEGO_COLORS.darkGray);
            leverArm.parent = lotteryTrigger;
            const leverBall = BABYLON.MeshBuilder.CreateSphere("slotLeverBall",
                { diameter: 0.22, segments: 12 }, scene);
            leverBall.position.set(0.95, 1.7, 0);
            const leverBallMat = legoMat("slotLeverBallMat", LEGO_COLORS.red);
            leverBallMat.emissiveColor = new BABYLON.Color3(0.4, 0.05, 0.05);
            leverBall.material = leverBallMat;
            leverBall.parent = lotteryTrigger;

            // 投币口（前下方的小黑色横槽）
            const slotCoin = BABYLON.MeshBuilder.CreateBox("slotCoin",
                { width: 0.5, height: 0.05, depth: 0.04 }, scene);
            slotCoin.position.set(0, 0.35, 0.46);
            slotCoin.material = legoMat("slotCoinMat", LEGO_COLORS.black);
            slotCoin.parent = lotteryTrigger;

            // 注册老虎机的碰撞 AABB（柜体半宽 0.7、半深 0.45）
            registerStaticObstacle(LOTTERY_X, LOTTERY_Z, 0.7, 0.45, 0.2);

            const lotteryLight = new BABYLON.PointLight(
                "lotteryLight",
                new BABYLON.Vector3(LOTTERY_X, 1.2, LOTTERY_Z),
                scene
            );
            lotteryLight.diffuse = new BABYLON.Color3(1, 0.8, 0);
            lotteryLight.intensity = 1.0;
            lotteryLight.range = 4;

            let lotteryTime = 0;
            scene.registerBeforeRender(() => {
                lotteryTime += 0.02;
                // 老虎机贴地不动（不再整体浮动 + 自转），改为：
                //   1. 顶部装饰灯：3 个灯交替闪烁
                //   2. 3 个滚轮：持续旋转（让玩家看到滚动效果）
                //   3. 底部光源：随节奏强弱呼吸
                slotTopLamps.forEach((lamp, idx) => {
                    const phase = lotteryTime * 6 + idx * 1.0;
                    const bright = (Math.sin(phase) + 1) * 0.5; // 0~1
                    lamp.mat.emissiveColor = lamp.baseColor.scale(0.2 + bright * 0.7);
                });
                slotReels.forEach((reel, idx) => {
                    // 每个滚轮速度略不同，制造动感
                    reel.rotation.x += 0.04 + idx * 0.015;
                });
                lotteryLight.intensity = 0.8 + Math.sin(lotteryTime * 4) * 0.3;
            });

            // ========== 乐高小人角色 ==========
            function createPlaceholderCharacter() {
                const characterGroup = new BABYLON.TransformNode("characterGroup", scene);

                // 乐高小人配色
                const skinColor = new BABYLON.Color3(1.0, 0.82, 0.15);   // 经典乐高黄皮肤
                const shirtColor = LEGO_COLORS.red;                       // 红色上衣
                const pantsColor = LEGO_COLORS.blue;                      // 深蓝裤子
                const hairColor = new BABYLON.Color3(0.22, 0.14, 0.08);   // 深棕头发

                // --- 两条腿（方形积木）---
                // legGroup 作为腿部容器，便于抬腿动画（父节点旋转以脚根为轴）
                const legMat = legoMat("legMat_ch", pantsColor);

                const legLGroup = new BABYLON.TransformNode("legLGroup", scene);
                legLGroup.parent = characterGroup;
                legLGroup.position.set(-0.13, 0.55, 0);
                const legL = BABYLON.MeshBuilder.CreateBox("legL", { width: 0.26, height: 0.55, depth: 0.3 }, scene);
                legL.position.y = -0.275; // 以 legLGroup 原点（髋部）为顶
                legL.material = legMat;
                legL.parent = legLGroup;

                const legRGroup = new BABYLON.TransformNode("legRGroup", scene);
                legRGroup.parent = characterGroup;
                legRGroup.position.set(0.13, 0.55, 0);
                const legR = BABYLON.MeshBuilder.CreateBox("legR", { width: 0.26, height: 0.55, depth: 0.3 }, scene);
                legR.position.y = -0.275;
                legR.material = legMat;
                legR.parent = legRGroup;

                // 腰带（黑色窄条）
                const belt = BABYLON.MeshBuilder.CreateBox("belt", { width: 0.56, height: 0.06, depth: 0.32 }, scene);
                belt.position.set(0, 0.58, 0);
                belt.material = legoMat("beltMat", LEGO_COLORS.black);
                belt.parent = characterGroup;

                // --- 梯形身体（上窄下宽）---
                // 使用 CreateCylinder 的 diameterTop/diameterBottom 近似梯形棱柱
                // 改用 CreateBox 缩放做梯形视觉：两层盒子
                const torsoGroup = new BABYLON.TransformNode("torsoGroup", scene);
                torsoGroup.parent = characterGroup;
                torsoGroup.position.set(0, 0.6, 0);

                // 身体主体（梯形近似：自定义 Mesh）
                const torso = BABYLON.MeshBuilder.CreateCylinder("torso", {
                    height: 0.7,
                    diameterTop: 0.48,
                    diameterBottom: 0.62,
                    tessellation: 4
                }, scene);
                torso.rotation.y = Math.PI / 4; // 让方柱正面朝前
                torso.position.y = 0.35;
                torso.scaling.z = 0.62; // 前后压扁更像乐高
                torso.material = legoMat("torsoMat", shirtColor);
                torso.parent = torsoGroup;

                // 肩部小方块
                const shoulder = BABYLON.MeshBuilder.CreateBox("shoulder", { width: 0.62, height: 0.12, depth: 0.36 }, scene);
                shoulder.position.y = 0.72;
                shoulder.material = legoMat("shoulderMat", shirtColor);
                shoulder.parent = torsoGroup;

                // --- 两只手臂（倾斜圆柱 + 手掌）---
                function createArm(side) {
                    const armGroup = new BABYLON.TransformNode("armGroup_" + side, scene);
                    armGroup.parent = torsoGroup;
                    armGroup.position.set(side * 0.35, 0.68, 0);

                    const upperArm = BABYLON.MeshBuilder.CreateCylinder("arm_" + side,
                        { diameter: 0.2, height: 0.55, tessellation: 10 }, scene);
                    upperArm.position.set(side * 0.04, -0.28, 0.02);
                    upperArm.rotation.z = side * 0.25;  // 微向外张
                    upperArm.rotation.x = -0.2;          // 微向前伸
                    upperArm.material = legoMat("armMat", shirtColor);
                    upperArm.parent = armGroup;

                    const hand = BABYLON.MeshBuilder.CreateCylinder("hand_" + side,
                        { diameter: 0.24, height: 0.18, tessellation: 10 }, scene);
                    hand.position.set(side * 0.14, -0.55, 0.12);
                    hand.rotation.z = side * 0.25;
                    hand.material = legoMat("handMat", LEGO_COLORS.yellow); // 皮肤色（黄）
                    hand.material.diffuseColor = skinColor;
                    hand.parent = armGroup;

                    return armGroup;
                }
                const armL = createArm(-1);
                const armR = createArm(1);

                // 脖子
                const neck = BABYLON.MeshBuilder.CreateCylinder("neck",
                    { diameter: 0.22, height: 0.12, tessellation: 10 }, scene);
                neck.position.set(0, 1.38, 0);
                neck.material = legoMat("neckMat", LEGO_COLORS.yellow);
                neck.material.diffuseColor = skinColor;
                neck.parent = characterGroup;

                // --- 圆柱状头部（乐高标志性）---
                const head = BABYLON.MeshBuilder.CreateCylinder("head",
                    { diameter: 0.55, height: 0.6, tessellation: 16 }, scene);
                head.position.set(0, 1.75, 0);
                const headMat = legoMat("headMat_ch", LEGO_COLORS.yellow);
                headMat.diffuseColor = skinColor;
                head.material = headMat;
                head.parent = characterGroup;

                // 头顶小突点（乐高 stud）
                const headStud = BABYLON.MeshBuilder.CreateCylinder("headStud",
                    { diameter: 0.3, height: 0.1, tessellation: 14 }, scene);
                headStud.position.set(0, 2.1, 0);
                headStud.material = headMat;
                headStud.parent = characterGroup;

                // --- 秀发（飘逸的乐高发型）---
                // 由 5 部分组成：头顶发盖 + 前额刘海 + 左右两侧鬓发 + 后脑长发
                const hairMat = legoMat("hairMat", hairColor);

                // 1. 头顶发盖（覆盖整个头顶并把 stud 隐藏）
                const hairTop = BABYLON.MeshBuilder.CreateBox("hairTop",
                    { width: 0.66, height: 0.32, depth: 0.66 }, scene);
                hairTop.position.set(0, 2.10, 0);
                hairTop.material = hairMat;
                hairTop.parent = characterGroup;

                // 2. 前额刘海（斜削的一块，靠前突出）
                const bangs = BABYLON.MeshBuilder.CreateBox("bangs",
                    { width: 0.62, height: 0.18, depth: 0.16 }, scene);
                bangs.position.set(0, 1.96, 0.28);
                bangs.rotation.x = -0.15; // 向前微倾
                bangs.material = hairMat;
                bangs.parent = characterGroup;

                // 3. 左右两侧鬓发（顺着脸颊垂下）
                [-1, 1].forEach(side => {
                    const sideHair = BABYLON.MeshBuilder.CreateBox("sideHair_" + side,
                        { width: 0.12, height: 0.42, depth: 0.55 }, scene);
                    sideHair.position.set(side * 0.32, 1.78, -0.02);
                    sideHair.rotation.z = side * -0.05;
                    sideHair.material = hairMat;
                    sideHair.parent = characterGroup;
                });

                // 4. 后脑长发（垂到肩膀的一块）
                const backHair = BABYLON.MeshBuilder.CreateBox("backHair",
                    { width: 0.55, height: 0.55, depth: 0.18 }, scene);
                backHair.position.set(0, 1.72, -0.28);
                backHair.material = hairMat;
                backHair.parent = characterGroup;

                // 5. 顶部小发束（呆毛/挑染的一小撮，让发型更生动）
                const tuft = BABYLON.MeshBuilder.CreateBox("hairTuft",
                    { width: 0.16, height: 0.18, depth: 0.16 }, scene);
                tuft.position.set(-0.12, 2.32, 0.05);
                tuft.rotation.z = 0.3;
                tuft.material = hairMat;
                tuft.parent = characterGroup;

                // --- 眼睛（两个黑色小点）---
                const eyeMat = legoMat("eyeMat", LEGO_COLORS.black);
                const eyeL = BABYLON.MeshBuilder.CreateSphere("eyeL", { diameter: 0.06 }, scene);
                eyeL.position.set(-0.1, 1.82, 0.27);
                eyeL.material = eyeMat;
                eyeL.parent = characterGroup;
                const eyeR = BABYLON.MeshBuilder.CreateSphere("eyeR", { diameter: 0.06 }, scene);
                eyeR.position.set(0.1, 1.82, 0.27);
                eyeR.material = eyeMat;
                eyeR.parent = characterGroup;

                // 嘴（浅红小弧/方块）
                const mouth = BABYLON.MeshBuilder.CreateBox("mouth",
                    { width: 0.14, height: 0.03, depth: 0.02 }, scene);
                mouth.position.set(0, 1.7, 0.28);
                mouth.material = legoMat("mouthMat", new BABYLON.Color3(0.5, 0.1, 0.1));
                mouth.parent = characterGroup;

                // 初始位置
                characterGroup.position = new BABYLON.Vector3(WALK_START_X, 0, 0);

                // 将腿/臂的 Group 引用存储在 metadata（用于行走动画）
                characterGroup.metadata = {
                    legL: legLGroup,
                    legR: legRGroup,
                    armL: armL,
                    armR: armR
                };

                return characterGroup;
            }

            // ========== 加载/创建角色 ==========
            let walker = null;
            let walkerLegs = null; // 占位角色的腿引用
            let walkAnimationGroup = null;

            const modelPath = urlParams.get('model') || null;

            if (modelPath) {
                BABYLON.SceneLoader.ImportMeshAsync("", "", modelPath, scene)
                    .then((result) => {
                        walker = result.meshes[0];
                        if (result.animationGroups.length > 0) {
                            walkAnimationGroup = result.animationGroups[0];
                            walkAnimationGroup.start(true);
                        }
                        walker.scaling = new BABYLON.Vector3(0.6, 0.6, 0.6);
                        walker.position = new BABYLON.Vector3(WALK_START_X, 0, 0);
                        document.getElementById('loadingText').style.display = 'none';
                    })
                    .catch(() => {
                        walker = createPlaceholderCharacter();
                        walkerLegs = walker.metadata;
                        document.getElementById('loadingText').style.display = 'none';
                    });
            } else {
                walker = createPlaceholderCharacter();
                walkerLegs = walker.metadata;
                document.getElementById('loadingText').style.display = 'none';
            }

            // ========== 角色行走参数 ==========
            const WALK_SPEED = 0.12;       // 移动速度
            let walkTime = 0;
            
            // 摇杆输入向量（归一化方向 + 强度 0~1）
            let moveInput = { x: 0, z: 0, magnitude: 0 };
            let currentScene = 'street'; // 当前场景：'street' 或 'shop'
            let atLotteryShop = false;   // 是否位于彩票店触发点（用于显示进入按钮）

            // ========== 键盘控制（PC）==========
            const keyState = { up: false, down: false, left: false, right: false };
            window.addEventListener('keydown', (e) => {
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W': keyState.up = true; break;
                    case 'ArrowDown': case 's': case 'S': keyState.down = true; break;
                    case 'ArrowLeft': case 'a': case 'A': keyState.left = true; break;
                    case 'ArrowRight': case 'd': case 'D': keyState.right = true; break;
                }
            });
            window.addEventListener('keyup', (e) => {
                switch (e.key) {
                    case 'ArrowUp': case 'w': case 'W': keyState.up = false; break;
                    case 'ArrowDown': case 's': case 'S': keyState.down = false; break;
                    case 'ArrowLeft': case 'a': case 'A': keyState.left = false; break;
                    case 'ArrowRight': case 'd': case 'D': keyState.right = false; break;
                }
            });

            // ========== 虚拟摇杆（屏幕方向 = 人物移动方向）==========
            // 原则：屏幕上看到摇杆推的是哪个方向，人物就往屏幕上的那个方向走（人物面向也同步）
            // 相机 alpha=-π/4、beta≈π/3.2，摄像机看向 (+X,-Z) 方向。
            // 屏幕 X 轴 → 世界向量 cameraRight (xz 分量)
            // 屏幕 -Y 轴 → 世界向量 cameraForwardFlat (xz 分量，y 归 0)
            const joystickBase = document.getElementById('joystickBase');
            const joystickThumb = document.getElementById('joystickThumb');
            const JOYSTICK_RADIUS = 55;
            let joystickActive = false;
            let joystickPointerId = null;
            const joystickCenter = { x: 0, y: 0 };

            // 预计算相机水平投影的 forward / right 向量（仅一次，因相机角度固定）
            // 相机从 target 指向相机位置的反向量即 forward。alpha=-PI/4 时，
            // 相机位置 ≈ target + R*(cos(alpha)*sin(beta), cos(beta), sin(alpha)*sin(beta))。
            // 我们要的是角色参考的"向前"（远离镜头）= -camera.forward 在 XZ 平面的投影。
            // 直接用 alpha 推导：camera 水平投影方向单位向量：
            //   相机朝向 target：方向向量 XZ 分量 = (-cos(alpha), -sin(alpha))
            //   所以"角色向前"（远离镜头，即镜头看向的方向）XZ = (-cos(alpha), -sin(alpha))
            //   角色"向右"（屏幕右侧）XZ = 垂直向量 = (-sin(alpha), cos(alpha))    [右手系 y 朝上]
            const camAlpha = camera.alpha; // -PI/4
            const forwardX = -Math.cos(camAlpha);
            const forwardZ = -Math.sin(camAlpha);
            const rightX = -Math.sin(camAlpha);
            const rightZ = Math.cos(camAlpha);

            function updateJoystickCenter() {
                const rect = joystickBase.getBoundingClientRect();
                joystickCenter.x = rect.left + rect.width / 2;
                joystickCenter.y = rect.top + rect.height / 2;
            }

            function setJoystickThumb(dx, dy) {
                joystickThumb.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            }

            // 将屏幕向量 (sx, sy) 映射到世界 XZ 向量
            // sx：右为正；sy：上为正（注意屏幕 Y 已反转）
            function screenToWorldDir(sx, sy) {
                return {
                    x: sx * rightX + sy * forwardX,
                    z: sx * rightZ + sy * forwardZ
                };
            }

            function joystickStart(e) {
                e.preventDefault();
                joystickActive = true;
                joystickPointerId = e.pointerId;
                joystickBase.setPointerCapture(e.pointerId);
                updateJoystickCenter();
                joystickMove(e);
            }

            function joystickMove(e) {
                if (!joystickActive || e.pointerId !== joystickPointerId) return;
                let dx = e.clientX - joystickCenter.x;
                let dy = e.clientY - joystickCenter.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > JOYSTICK_RADIUS) {
                    dx = (dx / dist) * JOYSTICK_RADIUS;
                    dy = (dy / dist) * JOYSTICK_RADIUS;
                }
                setJoystickThumb(dx, dy);

                const magnitude = Math.min(dist / JOYSTICK_RADIUS, 1);
                if (magnitude < 0.05) {
                    moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                    return;
                }
                // 屏幕归一化向量（屏幕上"上推"= sy > 0）
                const sx = dx / JOYSTICK_RADIUS;
                const sy = -dy / JOYSTICK_RADIUS;
                const world = screenToWorldDir(sx, sy);
                // 归一化世界方向，再乘强度
                const wlen = Math.sqrt(world.x * world.x + world.z * world.z) || 1;
                moveInput.x = world.x / wlen * magnitude;
                moveInput.z = world.z / wlen * magnitude;
                moveInput.magnitude = magnitude;
            }

            function joystickEnd(e) {
                if (e.pointerId !== joystickPointerId) return;
                joystickActive = false;
                joystickPointerId = null;
                setJoystickThumb(0, 0);
                moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
            }

            joystickBase.addEventListener('pointerdown', joystickStart);
            joystickBase.addEventListener('pointermove', joystickMove);
            joystickBase.addEventListener('pointerup', joystickEnd);
            joystickBase.addEventListener('pointercancel', joystickEnd);

            // ========== 场景切换（带敲门过渡动画） ==========
            let shopSceneObjects = []; // 店内场景 mesh 集合
            let shopSceneLights = [];  // 店内场景灯光集合
            // 店内"出门点"坐标（角色走到这里返回街道）
            let SHOP_EXIT_X = 0, SHOP_EXIT_Z = 8;
            // 店内活动边界
            const SHOP_BOUND_X = 6.5, SHOP_BOUND_Z = 8.5;

            const doorOverlay = document.getElementById('doorOverlay');
            const doorFrame = document.getElementById('doorFrame');
            const doorHand = document.getElementById('doorHand');
            const doorText = document.getElementById('doorText');
            const doorFlash = document.getElementById('doorFlash');

            // 提前获取所有 UI 引用，避免在 switchToShopScene/switchToStreetScene 等函数内
            // 因 TDZ（暂时性死区）抛 ReferenceError
            const lotteryShopButton = document.getElementById('lotteryShopButton');
            const lotteryButton = document.getElementById('lotteryButton');
            const lotteryShop = document.getElementById('lotteryShop');
            const closeShop = document.getElementById('closeShop');
            const balanceDisplay = document.getElementById('balance');
            const scratchCardOptions = document.querySelectorAll('.scratch-card-option');
            const scratchCard = document.getElementById('scratchCard');
            const closeScratch = document.getElementById('closeScratch');
            const scratchResult = document.getElementById('scratchResult');
            const scratchCanvas = document.getElementById('scratchCanvas');
            const insufficientFunds = document.getElementById('insufficientFunds');
            const slotMachine = document.getElementById('slotMachine');
            const closeSlotMachine = document.getElementById('closeSlotMachine');
            const spinButton = document.getElementById('spinButton');
            const resultMessage = document.getElementById('resultMessage');
            const reels = [
                document.getElementById('reel1'),
                document.getElementById('reel2'),
                document.getElementById('reel3')
            ];

            // 使用 WebAudio 合成"咚咚"敲门音（无需外部音频文件）
            let audioCtx = null;
            function playKnockSound() {
                try {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const times = [0, 0.2, 0.45];
                    times.forEach(t => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(120, audioCtx.currentTime + t);
                        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + t);
                        gain.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + t + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + t + 0.15);
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.start(audioCtx.currentTime + t);
                        osc.stop(audioCtx.currentTime + t + 0.2);
                    });
                } catch (e) { /* 忽略音频错误 */ }
            }

            // 执行敲门过渡：敲门 → 开门 → 白光 → 回调
            // 保证：无论中间任何步骤异常，最后都会强制收起遮罩
            function playDoorTransition(onMidway, onComplete) {
                let finished = false;
                const finalize = () => {
                    if (finished) return;
                    finished = true;
                    // 强制还原所有样式
                    doorOverlay.classList.remove('visible');
                    doorOverlay.style.display = 'none';
                    doorOverlay.style.opacity = '';
                    doorFrame.classList.remove('opening');
                    doorFlash.classList.remove('flash');
                    if (typeof onComplete === 'function') {
                        try { onComplete(); } catch (e) { console.error(e); }
                    }
                };

                try {
                    doorFrame.classList.remove('opening');
                    doorFlash.classList.remove('flash');
                    doorHand.style.display = 'block';
                    doorText.textContent = '咚 咚 咚...';
                    doorOverlay.classList.add('visible');
                    doorOverlay.style.display = 'flex';
                    doorOverlay.style.opacity = '1';

                    setTimeout(() => playKnockSound(), 100);

                    setTimeout(() => {
                        doorHand.style.display = 'none';
                        doorText.textContent = '门开了...';
                        doorFrame.classList.add('opening');
                    }, 1200);

                    setTimeout(() => {
                        doorFlash.classList.add('flash');
                        if (typeof onMidway === 'function') {
                            try { onMidway(); } catch (e) { console.error('[door midway error]', e); }
                        }
                    }, 1700);

                    // 2.5s 后强制收起
                    setTimeout(finalize, 2500);
                    // 兜底：4s 后即使前面所有 setTimeout 全失败，也强制收起
                    setTimeout(finalize, 4000);
                } catch (e) {
                    console.error('[door transition error]', e);
                    // 失败时直接执行 midway + finalize
                    if (typeof onMidway === 'function') {
                        try { onMidway(); } catch (e2) { console.error(e2); }
                    }
                    finalize();
                }
            }

            // 切换到店内场景：播放敲门动画后跳转到独立的彩票店关卡页面 lottery_shop.html
            // 余额通过 sessionStorage 在两个页面间传递
            //
            // 异步加载流程：
            //   1. 提前把余额写入 sessionStorage，并预热（preconnect/prefetch）目标页
            //   2. 播放完整敲门动画（不在白光时立即跳转，避免新页加载打断动画）
            //   3. 等敲门动画完整播放完毕（onComplete）再跳转到 lottery_shop.html
            //   4. 目标页有自己的 fadeOverlay loading 动画，会等场景 ready 后再淡出
            //   这样用户看到的是：敲门 → 门开 → 白光 → 平滑切到"走进彩票店..."loading → 场景出现
            function switchToShopScene() {
                if (currentScene !== 'street') return;
                // 锁住输入避免过渡中继续移动
                moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                lotteryShopButton.style.display = 'none';
                lotteryButton.style.display = 'none';

                // 把当前余额存到 sessionStorage，让彩票店页面读取
                try {
                    sessionStorage.setItem('balance', String(balance));
                } catch (e) { /* 忽略 storage 错误 */ }

                // 预热：让浏览器尽早开始解析/缓存目标页和资源
                // （prefetch 是低优先级，不会阻塞当前渲染，但能让跳转更快）
                try {
                    const prefetchHtml = document.createElement('link');
                    prefetchHtml.rel = 'prefetch';
                    prefetchHtml.href = 'lottery_shop.html';
                    document.head.appendChild(prefetchHtml);
                    const prefetchCss = document.createElement('link');
                    prefetchCss.rel = 'prefetch';
                    prefetchCss.href = 'lottery_shop.css';
                    document.head.appendChild(prefetchCss);
                    const prefetchJs = document.createElement('link');
                    prefetchJs.rel = 'prefetch';
                    prefetchJs.href = 'lottery_shop.js';
                    document.head.appendChild(prefetchJs);
                } catch (e) { /* 忽略 prefetch 失败 */ }

                let navigated = false;
                const navigate = () => {
                    if (navigated) return;
                    navigated = true;
                    window.location.href = 'lottery_shop.html';
                };

                playDoorTransition(
                    // 白光时刻：先不跳转，让动画继续播完
                    () => { /* no-op，等 onComplete 再跳 */ },
                    // 动画完整播完后再跳转，确保敲门 → 开门 → 白光过渡完整呈现
                    () => { navigate(); }
                );
            }

            // 店内场景已迁移到独立的 lottery_shop.html 关卡

            // 初始化街道场景物体列表（必须在 walker 创建完成后再注册）
            // 使用 mesh.metadata.isStreet 标记法避免误把角色子 mesh 加入
            // 这里采用快照方式：注册时刻，遍历所有 mesh，把"不属于 walker 子节点"的全部加入
            function isDescendantOf(node, root) {
                let cur = node.parent;
                while (cur) {
                    if (cur === root) return true;
                    cur = cur.parent;
                }
                return false;
            }
            function initStreetSceneObjects() {
                streetSceneObjects.length = 0; // 防止重复注册
                scene.meshes.forEach(mesh => {
                    // 排除角色及其所有子 mesh
                    if (walker && (mesh === walker || isDescendantOf(mesh, walker))) return;
                    streetSceneObjects.push(mesh);
                });
                scene.transformNodes.forEach(node => {
                    // 排除角色 TransformNode 本身和其子 TransformNode
                    if (walker && (node === walker || isDescendantOf(node, walker))) return;
                    streetSceneObjects.push(node);
                });
                scene.lights.forEach(l => {
                    streetSceneObjects.push(l);
                });
            }
            // 等 walker 创建完成 *并且* 所有街道物体都建好后再注册
            // 注意：tryInitStreet() 在 createScene 函数体执行流程中被声明，
            // 但实际触发要等到 createScene 整个函数 return 之后（街道物体已全部 new 完）
            // 所以用 setTimeout(0) 把它推到当前微任务之后执行。
            let _streetInitTries = 0;
            function tryInitStreet() {
                if (walker) {
                    initStreetSceneObjects();
                } else if (_streetInitTries++ < 30) {
                    setTimeout(tryInitStreet, 100);
                } else {
                    initStreetSceneObjects(); // 兜底
                }
            }
            // 推迟到 createScene 返回 + 一帧渲染之后，确保街道全部物体已构建
            setTimeout(tryInitStreet, 0);
            // 双保险：渲染开始后再注册一次（此时 walker、街道一定都齐全）
            scene.onReadyObservable.addOnce(() => {
                _streetInitTries = 0;
                tryInitStreet();
            });

            // ========== 彩票店控制（UI 引用已在前面统一获取，这里只声明业务变量）==========
            // 余额系统：优先从 sessionStorage 读取（从 lottery_shop.html 返回时保留余额）
            let balance = 100;
            try {
                const stored = sessionStorage.getItem('balance');
                if (stored !== null && !isNaN(parseInt(stored, 10))) {
                    balance = parseInt(stored, 10);
                }
            } catch (e) { /* 忽略 storage 错误 */ }

            // 更新余额显示，并同步到 sessionStorage
            function updateBalance() {
                balanceDisplay.textContent = balance;
                try { sessionStorage.setItem('balance', String(balance)); } catch (e) { /* ignore */ }
            }
            // 初始化显示
            updateBalance();

            // 打开彩票店（切换到杂货铺场景）
            lotteryShopButton.addEventListener('click', () => {
                switchToShopScene();
            });

            // 关闭彩票店（返回街道场景）
            closeShop.addEventListener('click', () => {
                switchToStreetScene();
            });

            // 刮刮乐奖项配置（真实刮刮乐玩法）
            const scratchCardPrizes = {
                5: {
                    gridCount: 15,  // 15个格子
                    winProbability: 0.25,  // 整体中奖概率25%
                    prizes: [
                        { symbol: '💎', amount: 1000, probability: 0.01 },
                        { symbol: '🌟', amount: 50, probability: 0.05 },
                        { symbol: '⭐', amount: 10, probability: 0.09 },
                        { symbol: '✨', amount: 5, probability: 0.10 }
                    ],
                    loseSymbol: '❌'
                },
                10: {
                    gridCount: 20,  // 20个格子
                    winProbability: 0.30,  // 整体中奖概率30%
                    prizes: [
                        { symbol: '💎', amount: 2000, probability: 0.008 },
                        { symbol: '🌟', amount: 100, probability: 0.04 },
                        { symbol: '⭐', amount: 20, probability: 0.12 },
                        { symbol: '✨', amount: 10, probability: 0.132 }
                    ],
                    loseSymbol: '❌'
                },
                20: {
                    gridCount: 25,  // 25个格子
                    winProbability: 0.35,  // 整体中奖概率35%
                    prizes: [
                        { symbol: '💎', amount: 5000, probability: 0.006 },
                        { symbol: '🌟', amount: 200, probability: 0.035 },
                        { symbol: '⭐', amount: 50, probability: 0.14 },
                        { symbol: '✨', amount: 20, probability: 0.169 }
                    ],
                    loseSymbol: '❌'
                }
            };

            // 生成刮刮乐格子
            function generateScratchGrid(price) {
                const config = scratchCardPrizes[price];
                const grid = [];
                
                // 首先决定这张彩票是否中奖
                const isTicketWin = Math.random() < config.winProbability;
                
                if (isTicketWin) {
                    // 中奖彩票：根据概率生成具体奖项
                    const random = Math.random();
                    let cumulativeProbability = 0;
                    let selectedPrize = null;
                    
                    for (const prize of config.prizes) {
                        cumulativeProbability += prize.probability;
                        if (random < cumulativeProbability) {
                            selectedPrize = prize;
                            break;
                        }
                    }
                    
                    // 添加中奖格子（1-3个）
                    const winCount = Math.floor(Math.random() * 3) + 1;  // 1-3个中奖格子
                    for (let i = 0; i < winCount; i++) {
                        grid.push({
                            symbol: selectedPrize.symbol,
                            amount: selectedPrize.amount,
                            isWin: true,
                            scratched: false
                        });
                    }
                }
                
                // 添加未中奖格子
                while (grid.length < config.gridCount) {
                    grid.push({
                        symbol: config.loseSymbol,
                        amount: 0,
                        isWin: false,
                        scratched: false
                    });
                }
                
                // 随机打乱格子顺序
                for (let i = grid.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [grid[i], grid[j]] = [grid[j], grid[i]];
                }
                
                return grid;
            }

            // 当前刮刮乐状态
            let currentScratchGrid = [];
            let currentScratchPrice = 0;
            let totalPrize = 0;

            // 创建刮刮乐格子
            function createScratchGrid(grid) {
                const gridContainer = document.getElementById('scratchGrid');
                gridContainer.innerHTML = '';
                totalPrize = 0;
                document.getElementById('scratchTotal').textContent = '总奖金: 0元';
                
                grid.forEach((cell, index) => {
                    const cellElement = document.createElement('div');
                    cellElement.className = 'scratch-cell';
                    cellElement.dataset.index = index;
                    cellElement.textContent = '?';
                    
                    // 点击刮开格子
                    cellElement.addEventListener('click', () => {
                        if (cellElement.classList.contains('scratched')) return;
                        
                        cellElement.classList.add('scratched');
                        cellElement.textContent = cell.symbol;
                        
                        if (cell.isWin) {
                            cellElement.classList.add('win');
                            totalPrize += cell.amount;
                            document.getElementById('scratchTotal').textContent = `总奖金: ${totalPrize}元`;
                        }
                        
                        grid[index].scratched = true;
                    });
                    
                    // 触摸事件（手机）
                    cellElement.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        if (cellElement.classList.contains('scratched')) return;
                        
                        cellElement.classList.add('scratched');
                        cellElement.textContent = cell.symbol;
                        
                        if (cell.isWin) {
                            cellElement.classList.add('win');
                            totalPrize += cell.amount;
                            document.getElementById('scratchTotal').textContent = `总奖金: ${totalPrize}元`;
                        }
                        
                        grid[index].scratched = true;
                    });
                    
                    gridContainer.appendChild(cellElement);
                });
            }

            // 关闭刮刮乐界面
            closeScratch.addEventListener('click', () => {
                // 如果有中奖，添加到余额
                if (totalPrize > 0) {
                    balance += totalPrize;
                    updateBalance();
                }
                scratchCard.style.display = 'none';
            });

            // 点击刮刮乐选项
            scratchCardOptions.forEach(option => {
                option.addEventListener('click', () => {
                    const price = parseInt(option.dataset.price);
                    
                    // 检查余额
                    if (balance < price) {
                        insufficientFunds.style.display = 'block';
                        setTimeout(() => {
                            insufficientFunds.style.display = 'none';
                        }, 2000);
                        return;
                    }
                    
                    // 扣除金额
                    balance -= price;
                    updateBalance();
                    
                    // 生成刮刮乐格子
                    currentScratchGrid = generateScratchGrid(price);
                    currentScratchPrice = price;
                    
                    // 显示刮刮乐界面
                    scratchCard.style.display = 'flex';
                    createScratchGrid(currentScratchGrid);
                });
            });

            // ========== 抽奖按钮控制（UI 引用已在前面统一获取，这里只声明业务变量）==========
            // 图标列表
            const icons = ['🍎', '🍊', '🍋', '🍇', '🍒', '💎', '⭐', '🌟'];

            // 点击抽奖按钮
            //   - 街道场景：打开老虎机
            //   - 店内场景（柜台前）：根据 dataset.shopPrice 直接打开对应刮刮乐
            lotteryButton.addEventListener('click', () => {
                const shopPrice = lotteryButton.dataset.shopPrice;
                if (currentScene === 'shop' && shopPrice) {
                    const price = parseInt(shopPrice);
                    // 检查余额
                    if (balance < price) {

                        setTimeout(() => { insufficientFunds.style.display = 'none'; }, 2000);
                        return;
                    }
                    balance -= price;
                    updateBalance();
                    currentScratchGrid = generateScratchGrid(price);
                    currentScratchPrice = price;
                    scratchCard.style.display = 'flex';
                    createScratchGrid(currentScratchGrid);

                }
                // 街道：老虎机
                slotMachine.style.display = 'flex';
                moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                resultMessage.textContent = '';

            });

            // 关闭老虎机
            closeSlotMachine.addEventListener('click', () => {
                slotMachine.style.display = 'none';
            });

            // 开始抽奖
            spinButton.addEventListener('click', () => {
                spinButton.disabled = true;
                resultMessage.textContent = '';
                resultMessage.className = 'result-message';

                // 随机决定是否中奖（10%概率）
                const isWin = Math.random() < 0.1;

                // 播放滚动动画
                reels.forEach(reel => reel.classList.add('spinning'));

                // 依次停止滚轮
                const stopTimes = [1000, 2000, 3000];
                reels.forEach((reel, index) => {
                    setTimeout(() => {
                        reel.classList.remove('spinning');
                        if (isWin) {
                            // 中奖：所有滚轮显示相同图标
                            reel.textContent = icons[Math.floor(Math.random() * icons.length)];
                        } else {
                            // 未中奖：随机图标
                            reel.textContent = icons[Math.floor(Math.random() * icons.length)];
                        }
                    }, stopTimes[index]);
                });

                // 显示结果
                setTimeout(() => {
                    spinButton.disabled = false;
                    
                    if (isWin) {
                        // 确保三个图标相同
                        const winningIcon = reels[0].textContent;
                        reels[1].textContent = winningIcon;
                        reels[2].textContent = winningIcon;
                        
                        resultMessage.textContent = '🎉 恭喜中奖！🎉';
                        resultMessage.className = 'result-message win';
                        
                        // 播放烟花特效
                        createFireworks();
                    } else {
                        resultMessage.textContent = '再接再厉！';
                        resultMessage.className = 'result-message lose';
                    }
                }, 3500);
            });

            // ========== 车撞人系统 ==========
            // 检测每辆车的 AABB 是否包含角色位置（XZ 平面）
            // 撞到时：把角色击退到马路外（沿被撞方向反推到最近人行道边缘）+ 屏幕红色闪烁 + 短暂无敌
            const hitFlashEl = document.getElementById('hitFlash');
            const hitToastEl = document.getElementById('hitToast');
            let invincibleUntil = 0; // 角色无敌截止时间（毫秒），防止持续被撞
            let hitFlashTimer = null;
            let hitToastTimer = null;
            const SAFE_Z = ROAD_WIDTH / 2 + SIDEWALK_WIDTH + 0.6; // 马路外缘 + 一点缓冲
            const SAFE_X = ROAD_WIDTH / 2 + SIDEWALK_WIDTH + 0.6;

            function showHitFeedback() {
                // 屏幕红色闪烁
                hitFlashEl.classList.remove('fadingOut');
                hitFlashEl.classList.add('visible');
                if (hitFlashTimer) clearTimeout(hitFlashTimer);
                hitFlashTimer = setTimeout(() => {
                    hitFlashEl.classList.add('fadingOut');
                    hitFlashEl.classList.remove('visible');
                    setTimeout(() => hitFlashEl.classList.remove('fadingOut'), 250);
                }, 200);
                // 提示弹幕
                hitToastEl.classList.add('visible');
                if (hitToastTimer) clearTimeout(hitToastTimer);
                hitToastTimer = setTimeout(() => {
                    hitToastEl.classList.remove('visible');
                }, 900);
            }

            function checkVehicleHit(now) {
                if (!walker || currentScene !== 'street') return;
                if (now < invincibleUntil) return; // 无敌期内跳过

                const px = walker.position.x;
                const pz = walker.position.z;
                const r = 0.4; // 角色软碰撞半径

                for (let i = 0; i < vehicles.length; i++) {
                    const v = vehicles[i];
                    const o = v.obstacle;
                    if (px + r > o.minX && px - r < o.maxX &&
                        pz + r > o.minZ && pz - r < o.maxZ) {
                        // 撞到了！
                        // 击退方向：垂直于车的行驶方向，把角色推到最近的马路外侧
                        if (v.axis === 'x') {
                            // X 向行驶的车，把角色沿 Z 推到人行道
                            walker.position.z = pz >= 0 ? SAFE_Z : -SAFE_Z;
                        } else {
                            // Z 向行驶的车，把角色沿 X 推
                            walker.position.x = px >= 0 ? SAFE_X : -SAFE_X;
                        }
                        // 防止击退后还在另一辆车里：再做一次 isPointBlocked 兜底（极小概率）
                        // 给 0.8 秒无敌期，避免连续触发
                        invincibleUntil = now + 800;
                        showHitFeedback();
                        return; // 一次只处理一辆车
                    }
                }
            }

            scene.registerBeforeRender(() => {
                // ========== 街道动态系统：车辆移动 + 红绿灯切换 + 动态 AABB 刷新 ==========
                // 这些更新与角色是否存在/场景是否切换无关，每帧都跑（让街道始终活着）
                updateVehicles();
                updateTrafficLights(performance.now());
                refreshDynamicObstacles();

                // ========== 车撞人检测（在 AABB 刷新之后立即检测）==========
                checkVehicleHit(performance.now());

                if (!walker) return;

                // ========== 合并键盘输入到 moveInput（街道和店内都支持）==========
                if (currentScene === 'street' || currentScene === 'shop') {
                    let kx = 0, kz = 0;
                    if (keyState.up) kz -= 1;
                    if (keyState.down) kz += 1;
                    if (keyState.left) kx -= 1;
                    if (keyState.right) kx += 1;

                    if (kx !== 0 || kz !== 0) {
                        const len = Math.sqrt(kx * kx + kz * kz);
                        const sx = kx / len, sy = -kz / len;
                        const world = screenToWorldDir(sx, sy);
                        const wlen = Math.sqrt(world.x * world.x + world.z * world.z) || 1;
                        moveInput.x = world.x / wlen;
                        moveInput.z = world.z / wlen;
                        moveInput.magnitude = 1;
                    } else if (!joystickActive) {
                        moveInput.x = 0; moveInput.z = 0; moveInput.magnitude = 0;
                    }
                }

                // ========== 角色移动（XZ 平面）==========
                const canMove = moveInput.magnitude > 0.05 && (currentScene === 'street' || currentScene === 'shop');
                if (canMove) {
                    const dx = moveInput.x * WALK_SPEED;
                    const dz = moveInput.z * WALK_SPEED;
                    const newX = walker.position.x + dx;
                    const newZ = walker.position.z + dz;

                    // 根据场景选择边界
                    const boundX = currentScene === 'shop' ? SHOP_BOUND_X : WALK_BOUND_X;
                    const boundZ = currentScene === 'shop' ? SHOP_BOUND_Z : WALK_BOUND_Z;

                    // 街道场景：分轴检测障碍物 AABB（允许沿墙滑动，不会被卡住）
                    // 店内场景：保持原边界检查（店内已有专门的墙体）
                    if (currentScene === 'street') {
                        const curX = walker.position.x;
                        const curZ = walker.position.z;
                        // 先尝试 X 轴：用 (newX, curZ) 检测
                        if (Math.abs(newX) <= boundX && !isPointBlocked(newX, curZ)) {
                            walker.position.x = newX;
                        }
                        // 再尝试 Z 轴：用 (新的 walker.x, newZ) 检测，已更新的 X 也算
                        if (Math.abs(newZ) <= boundZ && !isPointBlocked(walker.position.x, newZ)) {
                            walker.position.z = newZ;
                        }
                    } else {
                        if (Math.abs(newX) <= boundX) walker.position.x = newX;
                        if (Math.abs(newZ) <= boundZ) walker.position.z = newZ;
                    }

                    walkTime += 0.2 * moveInput.magnitude;
                    walker.rotation.y = Math.atan2(moveInput.x, moveInput.z);

                    if (walkerLegs) {
                        walkerLegs.legL.rotation.x = Math.sin(walkTime) * 0.6;
                        walkerLegs.legR.rotation.x = -Math.sin(walkTime) * 0.6;
                        // 手臂摆动（反向）
                        if (walkerLegs.armL) walkerLegs.armL.rotation.x = -Math.sin(walkTime) * 0.4;
                        if (walkerLegs.armR) walkerLegs.armR.rotation.x = Math.sin(walkTime) * 0.4;
                        walker.position.y = Math.abs(Math.sin(walkTime * 2)) * 0.05;
                    }
                } else {
                    if (walkerLegs) {
                        walkerLegs.legL.rotation.x = 0;
                        walkerLegs.legR.rotation.x = 0;
                        if (walkerLegs.armL) walkerLegs.armL.rotation.x = 0;
                        if (walkerLegs.armR) walkerLegs.armR.rotation.x = 0;
                        walker.position.y = 0;
                    }
                }

                // ========== 相机跟随 ==========
                camera.target.x = walker.position.x;
                camera.target.z = walker.position.z;
                camera.target.y = 0.5;

                // ========== 触发点检测 ==========
                if (currentScene === 'street') {
                    // 彩票店
                    const dxShop = walker.position.x - LOTTERY_SHOP_X;
                    const dzShop = walker.position.z - LOTTERY_SHOP_Z;
                    const distShop = Math.sqrt(dxShop * dxShop + dzShop * dzShop);
                    if (distShop < TRIGGER_DISTANCE) {
                        atLotteryShop = true;
                        lotteryShopButton.style.display = 'block';
                    } else {
                        atLotteryShop = false;
                        lotteryShopButton.style.display = 'none';
                    }

                    // 抽奖触发点
                    const dxLot = walker.position.x - LOTTERY_X;
                    const dzLot = walker.position.z - LOTTERY_Z;
                    const distLot = Math.sqrt(dxLot * dxLot + dzLot * dzLot);
                    if (distLot < TRIGGER_DISTANCE) {
                        lotteryButton.style.display = 'block';
                    } else {
                        lotteryButton.style.display = 'none';
                    }
                } else if (currentScene === 'shop') {
                    // 店内：检测是否走到门口（出门）
                    const dxExit = walker.position.x - SHOP_EXIT_X;
                    const dzExit = walker.position.z - SHOP_EXIT_Z;
                    const distExit = Math.sqrt(dxExit * dxExit + dzExit * dzExit);
                    if (distExit < 1.2) {
                        // 自动出门
                        switchToStreetScene();
                        return;
                    }

                    // 检测是否靠近柜台（显示"购买 Xx 元刮刮乐"按钮）
                    let nearestPrice = null;
                    let nearestDist = 2.0;
                    [ -4, 0, 4 ].forEach((cx, idx) => {
                        const prices = [5, 10, 20];
                        const dxC = walker.position.x - cx;
                        const dzC = walker.position.z - (-18 / 2 + 1.5 + 1); // 柜台前方
                        const distC = Math.sqrt(dxC * dxC + dzC * dzC);
                        if (distC < nearestDist) {
                            nearestDist = distC;
                            nearestPrice = prices[idx];
                        }
                    });
                    if (nearestPrice) {
                        lotteryButton.style.display = 'block';
                        lotteryButton.textContent = `🎫 购买 ${nearestPrice} 元刮刮乐`;
                        lotteryButton.dataset.shopPrice = nearestPrice;
                    } else {
                        if (lotteryButton.dataset.shopPrice) {
                            // 离开柜台，恢复原来文案
                            lotteryButton.textContent = '🎰 抽奖';
                            delete lotteryButton.dataset.shopPrice;
                        }
                        lotteryButton.style.display = 'none';
                    }
                }
            });

            // ========== 烟花粒子特效 ==========
            function createFireworks() {
                const fireworkColors = [
                    new BABYLON.Color4(1, 0, 0, 1),
                    new BABYLON.Color4(0, 1, 0, 1),
                    new BABYLON.Color4(0, 0, 1, 1),
                    new BABYLON.Color4(1, 1, 0, 1),
                    new BABYLON.Color4(1, 0, 1, 1),
                    new BABYLON.Color4(0, 1, 1, 1),
                    new BABYLON.Color4(1, 0.5, 0, 1)
                ];

                // 创建多个烟花爆炸
                for (let f = 0; f < 5; f++) {
                    setTimeout(() => {
                        const centerX = walker.position.x + (Math.random() - 0.5) * 6;
                        const centerY = 5 + Math.random() * 3;
                        const centerZ = (Math.random() - 0.5) * 4;

                        const particleSystem = new BABYLON.ParticleSystem("firework" + f, 500, scene);
                        
                        // 创建圆形纹理
                        const size = 32;
                        const textureCanvas = document.createElement('canvas');
                        textureCanvas.width = size;
                        textureCanvas.height = size;
                        const ctx = textureCanvas.getContext('2d');
                        
                        const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
                        gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
                        gradient.addColorStop(0.3, 'rgba(255, 255, 255, 0.8)');
                        gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                        
                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
                        ctx.fill();
                        
                        particleSystem.particleTexture = new BABYLON.Texture(textureCanvas.toDataURL(), scene);
                        
                        particleSystem.emitter = new BABYLON.Vector3(centerX, centerY, centerZ);
                        particleSystem.minEmitBox = new BABYLON.Vector3(0, 0, 0);
                        particleSystem.maxEmitBox = new BABYLON.Vector3(0, 0, 0);
                        
                        const color = fireworkColors[Math.floor(Math.random() * fireworkColors.length)];
                        particleSystem.color1 = color;
                        particleSystem.color2 = new BABYLON.Color4(color.r * 0.8, color.g * 0.8, color.b * 0.8, 1);
                        particleSystem.colorDead = new BABYLON.Color4(0, 0, 0, 0);
                        
                        particleSystem.minSize = 0.1;
                        particleSystem.maxSize = 0.3;
                        
                        particleSystem.minLifeTime = 1;
                        particleSystem.maxLifeTime = 2;
                        
                        particleSystem.emitRate = 500;
                        particleSystem.manualEmitCount = 500;
                        
                        particleSystem.blendMode = BABYLON.ParticleSystem.BLENDMODE_ADD;
                        
                        particleSystem.gravity = new BABYLON.Vector3(0, -5, 0);
                        
                        particleSystem.direction1 = new BABYLON.Vector3(-1, 0, -1);
                        particleSystem.direction2 = new BABYLON.Vector3(1, 1, 1);
                        
                        particleSystem.minAngularSpeed = 0;
                        particleSystem.maxAngularSpeed = Math.PI;
                        
                        particleSystem.minEmitPower = 8;
                        particleSystem.maxEmitPower = 12;
                        particleSystem.updateSpeed = 0.01;
                        
                        particleSystem.start();
                        
                        // 2秒后停止并销毁
                        setTimeout(() => {
                            particleSystem.stop();
                            setTimeout(() => {
                                particleSystem.dispose();
                            }, 2000);
                        }, 100);
                    }, f * 300);
                }
            }

            return scene;
        };
        
        const scene = createScene();
        
        engine.runRenderLoop(function() {
            scene.render();
        });
        
        window.addEventListener("resize", function() {
            engine.resize();
        });
    </script>
</body>
</html>
